services:
  db:
    image: postgres:16-alpine
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=30
    environment:
      POSTGRES_DB: log_sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d log_sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sentinel:sentinel@db:5432/log_sentinel}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-16100}
      API_SHARED_TOKEN: ${API_SHARED_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_SENDER: ${EMAIL_SENDER:-monitor@aihubautomate.com}
      EMAIL_RECIPIENT: ${EMAIL_RECIPIENT:-marcelo@aiknow.ai}
    ports:
      - "16100:16100"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["cloudflare"]
    depends_on:
      - api
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  pgdata:
